<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打开同花顺</title>
</head>
<body>
  <script>
    // 1. 获取股票代码（链接里传 ?code=600519）
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code') || "600519";

    // 2. 拼接同花顺协议（iOS 唯一有效）
    const thsScheme = `amihexin://stock/detail?code=${code}&market=SH`;

    // 3. 自动跳转到 Safari 打开协议（核心！）
    window.location.href = `x-web-search://?${encodeURIComponent(thsScheme)}`;

    // 4. 降级方案：跳同花顺手机网页
    setTimeout(() => {
      window.location.href = `https://m.10jqka.com.cn/stockpage/hs_${code}.html`;
    }, 1000);
  </script>

  <div style="text-align:center; margin-top:50px; font-size:18px;">
    正在跳转到同花顺 App...<br>
    若未跳转，请手动使用 Safari 打开
  </div>
</body>
</html>
