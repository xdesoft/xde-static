<!DOCTYPE html>
<html>
	<head>
		  <meta charset="utf-8">
		    <meta name="viewport" content="width=device-width, initial-scale=1">
		      <title>跳转同花顺</title>
	</head>
	<body>
		<script>
			// 从 URL 参数获取股票代码，例如 ?code=600519
			const code = new URLSearchParams(window.location.search).get('code') || '600519';
			const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

			if (isMobile) {
				  // 优先唤起 App
				  window.location.href = `fls://stockpage/${code}`;
				  // 3秒后未唤起，打开手机网页
				  setTimeout(() => {
					  window.location.href = `https://stockpage.10jqka.com.cn/${code}/`;
					    }, 3000);
			} else {
				  // PC 端打开 PC 版
				  window.location.href = `https://stockpage.10jqka.com.cn/${code}/`;
			}
		</script>
	</body>
</html>
